    .perspective-1000 {

    }

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .rotate-y-180 {
      transform: rotateY(180deg);
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {

      0%,

      }

      50% {

    // =============================================================
    function lsGet(key, def) {
      try {
        const v = localStorage.getItem(key);
        return v !== null ? JSON.parse(v) : def;
      } catch { return def; }
    }
    function lsSet(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch { }
    }
    function lsClear() {
      try {
        ['n5_statuses', 'n5_last_batch', 'n5_words_cache'].forEach(k => localStorage.removeItem(k));
      } catch { }
    }
    function getGeminiKey() {
      return lsGet('n5_gemini_key', '') || '';
    }

    // =============================================================
    // API — Google Apps Script
    // =============================================================
    async function fetchVocabulary() {
      if (!CONFIG.APPS_SCRIPT_URL) return null;
      try {
        const res = await fetch(CONFIG.APPS_SCRIPT_URL + (CONFIG.APPS_SCRIPT_URL.includes('?') ? '&' : '?') + '_t=' + Date.now());
        if (!res.ok) return null;
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return null;
        return data;
      } catch { return null; }
    }

    // =============================================================
    // APP COMPONENT
    // =============================================================
    function App() {
      // Vocabulary state
      const [words, setWords] = useState([]);
      const [wordStatuses, setWordStatuses] = useState({});
      const [lastBatch, setLastBatch] = useState([]);
      const [appLoading, setAppLoading] = useState(true);
      const [sheetError, setSheetError] = useState(false);

      // Navigation
      const [currentMode, setCurrentMode] = useState('menu');

      // Learning state
      const [learningBatch, setLearningBatch] = useState([]);
      const [learningIndex, setLearningIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [isReviewSession, setIsReviewSession] = useState(false);

      // Quiz state
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
      const [quizScore, setQuizScore] = useState(0);
      const [selectedAnswer, setSelectedAnswer] = useState(null);

      // UI state
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [geminiKeyInput, setGeminiKeyInput] = useState(() => getGeminiKey());
      const [showKeyText, setShowKeyText] = useState(false);

      // AI state
      const [aiLoading, setAiLoading] = useState(false);
      const [aiData, setAiData] = useState(null);
      const [aiError, setAiError] = useState("");

      const BATCH_SIZE = 10;

      // ----- Derived values -----
      const newWords = words.filter(w => !wordStatuses[w.kanji] || wordStatuses[w.kanji] === 'new');
      const reviewWords = words.filter(w => wordStatuses[w.kanji] === 'review');
      const learnedCount = words.filter(w => ['learned', 'review', 'mastered'].includes(wordStatuses[w.kanji])).length;
      const masteredCount = words.filter(w => wordStatuses[w.kanji] === 'mastered').length;
      const totalWords = words.length;

      // ----- Initialization -----
      useEffect(() => {
        async function init() {
          const localStatuses = lsGet('n5_statuses', {});
          const localLastBatch = lsGet('n5_last_batch', []);
          setLastBatch(localLastBatch);

          const sheetData = await fetchVocabulary();
          if (sheetData) {
            const vocab = sheetData.map(({ kanji, kana, meaning }) => ({ kanji, kana, meaning }));
            const statuses = {};
            sheetData.forEach(w => { if (w.kanji) statuses[w.kanji] = w.status || 'new'; });
            setWords(vocab);
            setWordStatuses(statuses);
            lsSet('n5_statuses', statuses);
            lsSet('n5_words_cache', vocab);
          } else {
            if (CONFIG.APPS_SCRIPT_URL) setSheetError(true);
            const cachedWords = lsGet('n5_words_cache', null);
            setWords(cachedWords || N5_WORDS_FALLBACK);
            setWordStatuses(localStatuses);
          }

          setAppLoading(false);
          const splash = document.getElementById('splash');
          if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 500); }
        }
        init();
      }, []);

      // Sync statuses to localStorage when changed
      useEffect(() => {
        if (!appLoading) lsSet('n5_statuses', wordStatuses);
      }, [wordStatuses, appLoading]);

      // ----- Status update -----
      const updateStatus = useCallback((kanji, status) => {
        setWordStatuses(prev => ({ ...prev, [kanji]: status }));
        pushStatus(kanji, status);
      }, []);

      // ----- Speech synthesis -----
      const playPronunciation = (text, fallback, e) => {
        if (e) e.stopPropagation();
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text || fallback);
        utterance.lang = 'ja-JP';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        const voices = window.speechSynthesis.getVoices();
        const jaVoice = voices.find(v => v.lang === 'ja-JP' && (v.name.includes('Google') || v.name.includes('Microsoft') || v.name.includes('Kyoko')))
          || voices.find(v => v.lang.startsWith('ja'));
        if (jaVoice) utterance.voice = jaVoice;
        window.speechSynthesis.speak(utterance);
      };

      useEffect(() => {
        if ('speechSynthesis' in window)
          window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }, []);

      // ----- Learning -----
      const startLearning = () => {
        const batch = newWords.slice(0, BATCH_SIZE);
        if (batch.length === 0) return;
        setLearningBatch(batch);
        setLearningIndex(0);
        setIsFlipped(false);
        setAiData(null); setAiError('');
        setIsReviewSession(false);
        setCurrentMode('learning');
      };

      const handleNextLearningWord = () => {
        if (learningIndex < learningBatch.length - 1) {
          setIsFlipped(false);
          setAiData(null); setAiError(''); setAiLoading(false);
          setTimeout(() => setLearningIndex(p => p + 1), 150);
        } else {
          if (!isReviewSession) {
            learningBatch.forEach(w => updateStatus(w.kanji, 'learned'));
            const batchKanjis = learningBatch.map(w => w.kanji);
            setLastBatch(batchKanjis);
            lsSet('n5_last_batch', batchKanjis);
          } else {
            // After reviewing wrong words: mark as learned again (ready for re-test)
            learningBatch.forEach(w => {
              if (wordStatuses[w.kanji] === 'review') updateStatus(w.kanji, 'learned');
            });
          }
          setCurrentMode('menu');
        }
      };

      // ----- Review -----
      const startReview = () => {
        if (reviewWords.length === 0) return;
        setLearningBatch([...reviewWords]);
        setLearningIndex(0);
        setIsFlipped(false);
        setAiData(null); setAiError('');
        setIsReviewSession(true);
        setCurrentMode('learning');
      };

      // ----- Quiz -----
      const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

      const generateQuestionsForWords = (wordsArray, allWords) => {
        const questions = [];
        wordsArray.forEach(word => {
          const others = allWords.filter(w => w.kanji !== word.kanji);
          const wrongMeanings = shuffle(others).slice(0, 3).map(w => w.meaning);
          questions.push({ originalWord: word, type: 'meaning', promptLabel: 'Chọn nghĩa của từ sau', promptMain: word.kanji, promptSub: word.kana, correctAnswer: word.meaning, options: shuffle([word.meaning, ...wrongMeanings]) });
          const wrongKanas = shuffle(others).slice(0, 3).map(w => w.kana);
          questions.push({ originalWord: word, type: 'reading', promptLabel: 'Chọn cách đọc của từ sau', promptMain: word.kanji, promptSub: word.meaning, correctAnswer: word.kana, options: shuffle([word.kana, ...wrongKanas]) });
          const wrongKanjis = shuffle(others).slice(0, 3).map(w => w.kanji);
          questions.push({ originalWord: word, type: 'writing', promptLabel: 'Chọn chữ Hán / Cách viết của từ sau', promptMain: word.meaning, promptSub: '', correctAnswer: word.kanji, options: shuffle([word.kanji, ...wrongKanjis]) });
        });
        return questions;
      };

      const openQuizOptions = () => {
        if (learnedCount === 0) return;
        if (lastBatch.length === 0 || learnedCount <= BATCH_SIZE) {
          handleStartQuiz('recent');
        } else {
          setCurrentMode('quizSelect');
        }
      };

      const handleStartQuiz = (type) => {
        const learnedWords = words.filter(w => ['learned', 'review', 'mastered'].includes(wordStatuses[w.kanji]));
        let questions = [];
        if (type === 'recent') {
          let recentWords = lastBatch.length > 0
            ? words.filter(w => lastBatch.includes(w.kanji))
            : [];
          if (recentWords.length === 0) recentWords = learnedWords.slice(0, BATCH_SIZE);
          if (recentWords.length === 0) return;
          questions = shuffle(generateQuestionsForWords(recentWords, words));
        } else {
          const allQ = generateQuestionsForWords(learnedWords, words);
          questions = shuffle(allQ).slice(0, 10);
        }
        setQuizQuestions(questions);
        setCurrentQuizIndex(0);
        setQuizScore(0);
        setSelectedAnswer(null);
        setCurrentMode('quiz');
      };

      const handleAnswerSelect = (option) => {
        if (selectedAnswer) return;
        setSelectedAnswer(option);
        const q = quizQuestions[currentQuizIndex];
        if (option === q.correctAnswer) {
          setQuizScore(p => p + 1);
          if (wordStatuses[q.originalWord.kanji] === 'review') {
            updateStatus(q.originalWord.kanji, 'mastered');
          }
        } else {
          updateStatus(q.originalWord.kanji, 'review');
        }
      };

      const handleNextQuestion = () => {
        if (currentQuizIndex < quizQuestions.length - 1) {
          setSelectedAnswer(null);
          setCurrentQuizIndex(p => p + 1);
        } else {
          setCurrentMode('result');
        }
      };

      // ----- Reset -----
      const handleReset = () => {
        setWordStatuses({});
        setLastBatch([]);
        setShowResetConfirm(false);
        lsClear();
      };

      // ----- AI (Gemini) -----
      const fetchAiHelp = async (word) => {
        const geminiKey = getGeminiKey();
        if (!geminiKey) { setAiError("Chưa có Gemini API key. Nhấn ⚙ để cài đặt."); return; }
        setAiLoading(true); setAiError(''); setAiData(null);
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`;
        const prompt = `Bạn là giáo viên tiếng Nhật N5. Từ vựng: "${word.kanji}" (${word.kana}) - nghĩa tiếng Việt: "${word.meaning}".

YÊU CẦU:
1. Viết 2 câu ví dụ HOÀN TOÀN bằng tiếng Nhật (N5), có phiên âm Romaji và dịch tiếng Việt.
2. Đưa ra 1 mẹo nhớ từ bằng tiếng Việt.`;
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                examples: { type: "ARRAY", items: { type: "OBJECT", properties: { japanese: { type: "STRING" }, romaji: { type: "STRING" }, vietnamese: { type: "STRING" } } } },
                tip: { type: "STRING" }
              }
            }
          }
        };
        try {
          const res = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) setAiData(JSON.parse(text)); else throw new Error('Empty response');
        } catch (err) {
          setAiError('Lỗi gọi AI. Kiểm tra API key hoặc thử lại sau.');
        } finally {
          setAiLoading(false);
        }
      };

      // =============================================================
      // RENDER: Loading
      // =============================================================
      if (appLoading) return null;

      // =============================================================
      // RENDER: Settings modal
      // =============================================================
      const renderSettings = () => (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
          onClick={() => setShowSettings(false)}>
          <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 animate-fade-in"
            onClick={e => e.stopPropagation()}>
            <h2 className="text-lg font-bold text-gray-800 mb-1">Cài đặt</h2>
            <p className="text-xs text-gray-500 mb-4">API key được lưu trong localStorage của trình duyệt, không nằm trong mã nguồn.</p>

            <label className="block text-sm font-semibold text-gray-700 mb-1">Gemini API Key</label>
            <div className="relative mb-1">
              <input
                type={showKeyText ? 'text' : 'password'}
                className="w-full border border-gray-300 rounded-lg pl-3 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                placeholder="AIza..."
                value={geminiKeyInput}
                onChange={e => setGeminiKeyInput(e.target.value)}
              />
              <button type="button" onClick={() => setShowKeyText(p => !p)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                {showKeyText ? <EyeOffIcon size={16} /> : <EyeIcon size={16} />}
              </button>
            </div>
            <p className="text-xs text-gray-400 mb-4">
              Lấy key miễn phí tại <span className="text-blue-500">aistudio.google.com/app/apikey</span>
            </p>

            <div className="flex gap-2">
              <button onClick={() => { lsSet('n5_gemini_key', geminiKeyInput.trim()); setShowSettings(false); }}
                className="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-blue-700 transition-colors">
                Lưu
              </button>
              <button onClick={() => { setGeminiKeyInput(''); lsSet('n5_gemini_key', ''); }}
                className="px-4 py-2 text-red-500 text-sm font-medium hover:bg-red-50 rounded-lg transition-colors">
                Xóa key
              </button>
              <button onClick={() => setShowSettings(false)}
                className="px-4 py-2 text-gray-500 text-sm font-medium hover:bg-gray-100 rounded-lg transition-colors">
                Đóng
              </button>
            </div>
          </div>
        </div>
      );

      // =============================================================
      // RENDER: Menu
      // =============================================================
      const renderMenu = () => (
        <div className="flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-xl max-w-md w-full relative">
          <button onClick={() => setShowSettings(true)}
            title="Cài đặt"
            className="absolute top-4 right-4 text-gray-400 hover:text-gray-700 hover:bg-gray-100 p-2 rounded-full transition-colors">
            <SettingsIcon size={18} />
          </button>
          <div className="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6">
            <GradCapIcon size={40} />
          </div>
          <h1 className="text-2xl font-bold text-gray-800 mb-1">Gungun N5 Flashcards</h1>
          {sheetError && (
            <p className="text-xs text-orange-500 mb-2 text-center">⚠ Không kết nối được Google Sheets, dùng dữ liệu offline.</p>
          )}
          <p className="text-gray-500 text-center mb-6 text-sm">Học từ vựng theo cụm 10 từ và làm bài trắc nghiệm tích lũy!</p>

          {/* Progress bar */}
          <div className="w-full bg-gray-100 rounded-full h-3 mb-2 overflow-hidden">
            <div className="bg-blue-600 h-3 rounded-full transition-all duration-700"
              style={{ width: `${totalWords ? (learnedCount / totalWords) * 100 : 0}%` }}></div>
          </div>
          <p className="text-sm text-gray-600 font-medium mb-2">
            Đã học: <span className="text-blue-600 font-bold text-base">{learnedCount}</span> / {totalWords} từ
          </p>

          {/* Status badges */}
          {learnedCount > 0 && (
            <div className="flex gap-3 mb-6 text-xs">
              <span className="px-2 py-1 bg-blue-50 text-blue-600 rounded-full font-medium">📘 {learnedCount} đã học</span>
              {reviewWords.length > 0 && <span className="px-2 py-1 bg-orange-50 text-orange-600 rounded-full font-medium">⚠ {reviewWords.length} cần ôn</span>}
              {masteredCount > 0 && <span className="px-2 py-1 bg-green-50 text-green-600 rounded-full font-medium">✓ {masteredCount} thuộc lòng</span>}
            </div>
          )}

          <div className="space-y-3 w-full">
            <button onClick={startLearning} disabled={newWords.length === 0}
              className={`w-full flex items-center justify-center gap-2 py-4 px-6 rounded-xl font-bold text-white transition-all transform active:scale-95 ${newWords.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-md hover:shadow-lg'}`}>
              <BookOpenIcon size={20} />
              {newWords.length === 0 ? 'Đã học hết từ vựng!' : `Học ${Math.min(BATCH_SIZE, newWords.length)} từ tiếp theo`}
            </button>

            <button onClick={openQuizOptions} disabled={learnedCount === 0}
              className={`w-full flex items-center justify-center gap-2 py-4 px-6 rounded-xl font-bold transition-all transform active:scale-95 ${learnedCount === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 shadow-sm'}`}>
              <PlayIcon size={20} />
              Kiểm tra ({learnedCount} từ)
            </button>

            {reviewWords.length > 0 && (
              <button onClick={startReview}
                className="w-full flex items-center justify-center gap-2 py-4 px-6 rounded-xl font-bold text-orange-700 bg-orange-100 hover:bg-orange-200 transition-all shadow-sm transform active:scale-95 animate-fade-in">
                <AlertIcon size={20} />
                Ôn lại từ sai ({reviewWords.length} từ)
              </button>
            )}
          </div>

          {learnedCount > 0 && (
            <div className="mt-8 text-center">
              {!showResetConfirm ? (
                <button onClick={() => setShowResetConfirm(true)}
                  className="text-xs text-gray-400 hover:text-red-500 transition-colors underline">
                  Xóa tiến trình học
                </button>
              ) : (
                <div className="bg-red-50 p-4 rounded-xl border border-red-100 animate-fade-in">
                  <p className="text-sm text-red-600 font-medium mb-3">Bạn có chắc chắn muốn xóa toàn bộ tiến trình không?</p>
                  <div className="flex gap-2 justify-center">
                    <button onClick={handleReset} className="px-4 py-2 bg-red-500 text-white text-sm font-bold rounded-lg hover:bg-red-600">Đồng ý</button>
                    <button onClick={() => setShowResetConfirm(false)} className="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-bold rounded-lg hover:bg-gray-300">Hủy</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );

      // =============================================================
      // RENDER: Quiz Select
      // =============================================================
      const renderQuizSelect = () => (
        <div className="flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-xl max-w-md w-full text-center">
          <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
            <PlayIcon size={40} />
          </div>
          <h2 className="text-2xl font-bold text-gray-800 mb-2">Chọn chế độ kiểm tra</h2>
          <p className="text-gray-500 mb-8 text-sm">Bạn muốn ôn tập theo phương pháp nào?</p>
          <div className="space-y-4 w-full">
            <button onClick={() => handleStartQuiz('recent')}
              className="w-full flex flex-col items-start p-4 rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 hover:bg-blue-100 transition-all">
              <span className="font-bold text-lg mb-1">Kiểm tra bài mới</span>
              <span className="text-sm opacity-80">30 câu hỏi cho {Math.min(BATCH_SIZE, lastBatch.length)} từ vừa học xong</span>
            </button>
            <button onClick={() => handleStartQuiz('random')}
              className="w-full flex flex-col items-start p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 transition-all">
              <span className="font-bold text-lg mb-1">Kiểm tra tổng hợp</span>
              <span className="text-sm opacity-80">10 câu hỏi ngẫu nhiên trong {learnedCount} từ đã học</span>
            </button>
          </div>
          <button onClick={() => setCurrentMode('menu')} className="mt-6 text-gray-500 hover:text-gray-800 font-medium text-sm">
            ← Quay lại
          </button>
        </div>
      );

      // =============================================================
      // RENDER: Learning
      // =============================================================
      const renderLearning = () => {
        const currentWord = learningBatch[learningIndex];
        if (!currentWord) return null;
        return (
          <div className="flex flex-col items-center justify-center w-full max-w-md pb-12">
            <div className="w-full flex justify-between items-center mb-6 px-1">
              <button onClick={() => setCurrentMode('menu')} className="text-gray-500 hover:text-gray-800 font-medium text-sm">
                ← Thoát
              </button>
              <div className="text-gray-500 font-medium text-sm flex items-center gap-2">
                {isReviewSession && <AlertIcon size={14} className="text-orange-500" />}
                Từ {learningIndex + 1} / {learningBatch.length}
              </div>
            </div>

            {/* Flashcard with 3D flip */}
            <div className="perspective-1000 w-full h-72 cursor-pointer relative select-none"
              onClick={() => setIsFlipped(f => !f)}>
              <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                {/* Front: Japanese */}
                <div className="absolute w-full h-full bg-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 backface-hidden border border-gray-100" lang="ja">
                  <button onClick={(e) => playPronunciation(currentWord.kanji, currentWord.kana, e)}
                    className="absolute top-4 right-4 p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors"
                    title="Nghe phát âm">
                    <VolumeIcon size={22} />
                  </button>
                  <span className="text-gray-400 text-xs tracking-widest uppercase mb-4 font-semibold">Chạm để lật</span>
                  <h2 className="text-6xl font-bold text-gray-800 mb-4">{currentWord.kanji}</h2>
                  <p className="text-xl text-blue-600 font-medium bg-blue-50 py-2 px-5 rounded-full">{currentWord.kana}</p>
                </div>
                {/* Back: Vietnamese */}
                <div className="absolute w-full h-full bg-blue-600 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 backface-hidden rotate-y-180">
                  <span className="text-blue-200 text-xs tracking-widest uppercase mb-4 font-semibold">Ý nghĩa</span>
                  <h2 className="text-4xl font-bold text-center leading-tight">{currentWord.meaning}</h2>
                </div>
              </div>
            </div>

            {/* AI Assistant */}
            <div className="w-full mt-5">
              {!aiData && !aiLoading && (
                <button onClick={() => fetchAiHelp(currentWord)}
                  className="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 transition-colors border border-indigo-200">
                  <SparklesIcon size={16} className="text-indigo-500" />
                  Giải thích &amp; Lấy ví dụ với AI ✨
                </button>
              )}
              {aiLoading && (
                <div className="w-full flex items-center justify-center gap-2 py-3 px-4 text-indigo-500 bg-indigo-50 rounded-xl">
                  <LoaderIcon size={16} className="animate-spin" />
                  AI đang suy nghĩ...
                </div>
              )}
              {aiError && <p className="text-center text-red-500 text-sm mt-2">{aiError}</p>}
              {aiData && (
                <div className="w-full bg-white p-5 rounded-2xl shadow-sm border border-indigo-100 mt-2 text-left animate-fade-in">
                  <h3 className="flex items-center gap-2 font-bold text-indigo-700 mb-3 border-b border-indigo-50 pb-2 text-sm">
                    <SparklesIcon size={14} /> Mẹo nhớ từ AI
                  </h3>
                  <p className="text-gray-700 text-sm leading-relaxed mb-4">{aiData.tip}</p>
                  <h3 className="font-bold text-gray-800 mb-2 text-sm">Câu ví dụ:</h3>
                  <ul className="space-y-3">
                    {(aiData.examples || []).map((ex, idx) => (
                      <li key={idx} className="bg-gray-50 p-3 rounded-xl border border-gray-100" lang="ja">
                        <p className="font-medium text-gray-800 flex items-center gap-2 text-sm">
                          {ex.japanese}
                          <button onClick={() => playPronunciation(ex.japanese, '', null)}
                            className="text-gray-400 hover:text-indigo-600 focus:outline-none flex-shrink-0">
                            <VolumeIcon size={13} />
                          </button>
                        </p>
                        <p className="text-xs text-gray-500 mt-1">{ex.romaji}</p>
                        <p className="text-sm text-indigo-600 mt-1">{ex.vietnamese}</p>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>

            <button onClick={handleNextLearningWord}
              className="mt-5 bg-gray-800 text-white w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-gray-900 transition-colors shadow-lg active:scale-95 transform">
              {learningIndex < learningBatch.length - 1 ? 'Từ tiếp theo' : (isReviewSession ? 'Hoàn thành ôn tập' : 'Hoàn thành phiên học')}
              <ArrowRightIcon size={20} />
            </button>
          </div>
        );
      };

      // =============================================================
      // RENDER: Quiz
      // =============================================================
      const renderQuiz = () => {
        const question = quizQuestions[currentQuizIndex];
        if (!question) return null;
        return (
          <div className="flex flex-col w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
            <div className="bg-emerald-500 p-6 text-white text-center relative">
              <button onClick={() => setCurrentMode('menu')} className="absolute left-4 top-6 text-emerald-100 hover:text-white font-medium text-sm">
                Thoát
              </button>
              <span className="text-emerald-100 font-medium text-sm">Câu hỏi {currentQuizIndex + 1} / {quizQuestions.length}</span>
              <div className="mt-3 text-emerald-200 text-xs font-semibold uppercase tracking-wider">{question.promptLabel}</div>
              <h2 className="text-5xl font-bold mt-2 flex items-center justify-center gap-2" lang="ja">
                {question.promptMain}
                {(question.type === 'meaning' || question.type === 'reading') && (
                  <button onClick={(e) => playPronunciation(question.originalWord.kanji, question.originalWord.kana, e)}
                    className="text-emerald-200 hover:text-white transition-colors">
                    <VolumeIcon size={22} />
                  </button>
                )}
              </h2>
              {question.promptSub && <p className="text-lg mt-2 opacity-90">{question.promptSub}</p>}
            </div>

            <div className="p-6 space-y-3">
              {question.options.map((option, idx) => {
                const isSelected = selectedAnswer === option;
                const isCorrect = option === question.correctAnswer;
                let cls = "w-full text-left p-4 rounded-xl border-2 font-medium transition-all flex justify-between items-center ";
                if (!selectedAnswer) {
                  cls += "border-gray-200 hover:border-emerald-500 hover:bg-emerald-50 text-gray-700";
                } else if (isCorrect) {
                  cls += "border-emerald-500 bg-emerald-50 text-emerald-700";
                } else if (isSelected && !isCorrect) {
                  cls += "border-red-500 bg-red-50 text-red-700";
                } else {
                  cls += "border-gray-100 opacity-40 text-gray-400";
                }
                return (
                  <button key={idx} onClick={() => handleAnswerSelect(option)} disabled={!!selectedAnswer} className={cls}>
                    <span className="text-base" lang="ja">{option}</span>
                    {selectedAnswer && isCorrect && <CheckCircleIcon size={20} className="text-emerald-500 flex-shrink-0" />}
                    {selectedAnswer && isSelected && !isCorrect && <XCircleIcon size={20} className="text-red-500 flex-shrink-0" />}
                  </button>
                );
              })}

              {selectedAnswer && (
                <button onClick={handleNextQuestion}
                  className="w-full mt-4 bg-emerald-500 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 transition-colors shadow-md animate-fade-in">
                  Tiếp tục <ArrowRightIcon size={20} />
                </button>
              )}
            </div>
          </div>
        );
      };

      // =============================================================
      // RENDER: Result
      // =============================================================
      const renderResult = () => {
        const total = quizQuestions.length;
        const pct = total ? Math.round((quizScore / total) * 100) : 0;
        const msg = pct >= 90 ? '🏆 Xuất sắc!' : pct >= 70 ? '👍 Tốt lắm!' : pct >= 50 ? '💪 Cố gắng thêm!' : '📚 Cần ôn thêm!';
        return (
          <div className="flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-xl max-w-md w-full text-center">
            <div className="w-24 h-24 bg-yellow-100 text-yellow-500 rounded-full flex items-center justify-center mb-6">
              <TrophyIcon size={48} />
            </div>
            <h2 className="text-3xl font-bold text-gray-800 mb-1">Kết quả</h2>
            <p className="text-gray-500 mb-6 text-sm">{total} câu hỏi — {msg}</p>
            <div className="text-6xl font-black text-emerald-500 mb-2">
              {quizScore}<span className="text-3xl text-gray-300">/{total}</span>
            </div>
            <p className="text-gray-400 text-sm mb-8">{pct}% chính xác</p>
            <button onClick={() => setCurrentMode('menu')}
              className="w-full flex items-center justify-center gap-2 bg-gray-800 text-white py-4 rounded-xl font-bold hover:bg-gray-900 transition-colors shadow-md">
              <RotateCcwIcon size={20} />
              Về trang chủ
            </button>
          </div>
        );
      };

      // =============================================================
      // MAIN RENDER
      // =============================================================
      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
          {currentMode === 'menu' && renderMenu()}
          {currentMode === 'quizSelect' && renderQuizSelect()}
          {currentMode === 'learning' && renderLearning()}
          {currentMode === 'quiz' && renderQuiz()}
          {currentMode === 'result' && renderResult()}
          {showSettings && renderSettings()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
